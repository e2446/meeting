<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Integral – Function Hall Notice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #faf6f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      font-family: 'Source Sans 3', sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: #7c4f2a;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      background: #7c4f2a;
    }

    .corner {
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: #a0673a;
      border-style: solid;
    }
    .corner.tl { top: 18px; left: 18px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; }

    .company-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: #4a2c0e;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
      text-align: center;
    }

    .tagline {
      font-size: 11px;
      color: #a07850;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .divider {
      width: 120px;
      height: 1.5px;
      background: #a0673a;
      margin: 0 auto 2.5rem;
      opacity: 0.5;
    }

    .notice-card {
      background: #ffffff;
      border: 1.5px solid #d9c4ae;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      position: relative;
      box-shadow: 0 4px 24px rgba(124, 79, 42, 0.08);
    }

    .notice-card::before {
      content: '';
      position: absolute;
      top: -1.5px; left: 32px; right: 32px;
      height: 3px;
      background: #7c4f2a;
      border-radius: 2px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #f5ede3;
      border: 1px solid #d9b899;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #7c4f2a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #7c4f2a;
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.75); }
    }

    .headline {
      font-size: 12px;
      color: #b08060;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .event-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      color: #3a1f08;
      margin-bottom: 1.8rem;
      line-height: 1.3;
    }

    .venue-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #faf0e6;
      border: 1px solid #d9c4ae;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.2rem;
    }

    .venue-icon {
      font-size: 22px;
      color: #7c4f2a;
    }

    .venue-label {
      font-size: 11px;
      color: #b08060;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .venue-name {
      font-size: 17px;
      font-weight: 600;
      color: #4a2c0e;
      letter-spacing: 0.04em;
    }

    .schedule-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #faf0e6;
      border: 1px solid #d9c4ae;
      border-radius: 8px;
      padding: 0.85rem 1.5rem;
      margin-bottom: 1.2rem;
    }

    .schedule-row i {
      font-size: 18px;
      color: #7c4f2a;
    }

    .schedule-label {
      font-size: 11px;
      color: #b08060;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .schedule-time {
      font-size: 15px;
      font-weight: 600;
      color: #4a2c0e;
      letter-spacing: 0.04em;
    }

    .live-time-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 0.4rem;
      font-size: 13px;
      color: #a07850;
      letter-spacing: 0.1em;
    }

    .live-time-row i {
      color: #7c4f2a;
      font-size: 15px;
      vertical-align: -1px;
    }

    #clock {
      color: #5a3518;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <p class="company-name">Integral</p>
  <p class="tagline">Corporate Event Directory</p>
  <div class="divider"></div>

  <div class="notice-card">
    <div class="live-badge">
      <span class="dot"></span>
      In Progress
    </div>

    <p class="headline">Meeting currently held at</p>
    <p class="event-title">Company Meeting</p>

    <div class="venue-row">
      <i class="ti ti-building venue-icon" aria-hidden="true"></i>
      <div>
        <p class="venue-label">Venue</p>
        <p class="venue-name">Function Hall</p>
      </div>
    </div>

    <div class="schedule-row">
      <i class="ti ti-calendar-time" aria-hidden="true"></i>
      <div>
        <p class="schedule-label">Schedule</p>
        <p class="schedule-time">8:00 AM – 5:00 PM</p>
      </div>
    </div>

    <div class="live-time-row">
      <i class="ti ti-clock"></i>
      <span id="clock"></span>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      document.getElementById('clock').textContent =
        hours + ':' + minutes + ':' + seconds + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
