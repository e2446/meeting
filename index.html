<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Integral – Function Hall Notice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #faf6f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Source Sans 3', sans-serif;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: #7c4f2a;
      z-index: 10;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 6px;
      background: #7c4f2a;
      z-index: 10;
    }

    .corner {
      position: fixed;
      width: 40px;
      height: 40px;
      border-color: #a0673a;
      border-style: solid;
      z-index: 10;
    }
    .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

    .company-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 700;
      color: #4a2c0e;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
      text-align: center;
    }

    .tagline {
      font-size: clamp(9px, 1vw, 12px);
      color: #a07850;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: clamp(1rem, 2vh, 2rem);
      text-align: center;
    }

    .divider {
      width: 100px;
      height: 1.5px;
      background: #a0673a;
      margin: 0 auto clamp(1rem, 2vh, 2rem);
      opacity: 0.5;
    }

    .notice-card {
      background: #ffffff;
      border: 1.5px solid #d9c4ae;
      border-radius: 14px;
      padding: clamp(1.2rem, 3vh, 2.2rem) clamp(1.5rem, 4vw, 3rem);
      max-width: min(560px, 88vw);
      width: 100%;
      text-align: center;
      position: relative;
      box-shadow: 0 4px 24px rgba(124, 79, 42, 0.08);
    }

    .notice-card::before {
      content: '';
      position: absolute;
      top: -1.5px; left: 32px; right: 32px;
      height: 3px;
      background: #7c4f2a;
      border-radius: 2px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #f5ede3;
      border: 1px solid #d9b899;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: clamp(10px, 1.1vw, 13px);
      font-weight: 600;
      color: #7c4f2a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: clamp(0.8rem, 1.5vh, 1.5rem);
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #7c4f2a;
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.75); }
    }

    .headline {
      font-size: clamp(10px, 1vw, 13px);
      color: #b08060;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .event-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 400;
      color: #3a1f08;
      margin-bottom: clamp(0.8rem, 1.5vh, 1.5rem);
      line-height: 1.3;
    }

    .venue-row, .schedule-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #faf0e6;
      border: 1px solid #d9c4ae;
      border-radius: 8px;
      padding: clamp(0.6rem, 1.2vh, 1rem) 1.5rem;
      margin-bottom: clamp(0.6rem, 1vh, 1rem);
    }

    .venue-row i, .schedule-row i {
      font-size: clamp(18px, 2vw, 24px);
      color: #7c4f2a;
    }

    .venue-label, .schedule-label {
      font-size: clamp(9px, 0.9vw, 11px);
      color: #b08060;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .venue-name, .schedule-time {
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 600;
      color: #4a2c0e;
      letter-spacing: 0.04em;
    }

    .live-time-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin-top: 0.5rem;
      font-size: clamp(12px, 1.2vw, 15px);
      color: #a07850;
      letter-spacing: 0.1em;
    }

    .live-time-row i {
      color: #7c4f2a;
      font-size: clamp(14px, 1.3vw, 17px);
      vertical-align: -1px;
    }

    #clock {
      color: #5a3518;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <p class="company-name">Integral</p>

  <div class="divider"></div>

  <div class="notice-card">
    <div class="live-badge">
      <span class="dot"></span>
      In Progress
    </div>

    <p class="headline">DIRTI COFFEE </p>
    <p class="event-title">Company Training</p>

    <div class="venue-row">
      <i class="ti ti-building" aria-hidden="true"></i>
      <div>
        <p class="venue-label">Venue</p>
        <p class="venue-name">Function Hall</p>
      </div>
    </div>

    <div class="schedule-row">
      <i class="ti ti-calendar-time" aria-hidden="true"></i>
      <div>
        <p class="schedule-label">Schedule</p>
        <p class="schedule-time">8:00 AM – 5:00 PM</p>
      </div>
    </div>

    <div class="live-time-row">
      <i class="ti ti-clock"></i>
      <span id="clock"></span>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ampm = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      document.getElementById('clock').textContent =
        hours + ':' + minutes + ':' + seconds + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
