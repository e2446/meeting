<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Integral – Function Hall Notice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #1a0f08; font-family: 'Source Sans 3', sans-serif; }

    /* ── CANVAS BACKGROUND ── */
    #bgCanvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── INTRO ── */
    #intro {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #intro.show { opacity: 1; }
    #intro.hide { opacity: 0; pointer-events: none; }

    .scanline {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
      pointer-events: none; z-index: 1;
    }
    .vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.72) 100%);
      pointer-events: none; z-index: 2;
    }

    .intro-content { position: relative; z-index: 3; text-align: center; }

    .welcome-label {
      font-size: clamp(10px, 1.2vw, 13px);
      letter-spacing: 0.5em; text-transform: uppercase;
      color: #a07050; margin-bottom: 1.5rem;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.7s 0.2s ease, transform 0.7s 0.2s ease;
    }
    .intro-content.animate-in .welcome-label { opacity: 1; transform: translateY(0); }

    .intro-logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700; color: #d4aa80;
      letter-spacing: 0.2em; text-transform: uppercase;
      line-height: 1; position: relative;
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.7s 0.5s ease, transform 0.7s 0.5s ease;
      text-shadow: 0 0 40px rgba(200,150,90,0.3);
    }
    .intro-content.animate-in .intro-logo { opacity: 1; transform: translateY(0); }

    .intro-logo::before, .intro-logo::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      color: #d4aa80; opacity: 0;
    }

    .intro-divider {
      width: 80px; height: 1px; background: linear-gradient(90deg, transparent, #8a5a30, transparent);
      margin: 1.5rem auto;
      opacity: 0; transform: scaleX(0);
      transition: opacity 0.5s 0.9s ease, transform 0.5s 0.9s ease;
    }
    .intro-content.animate-in .intro-divider { opacity: 1; transform: scaleX(1); }

    .intro-sub {
      font-size: clamp(9px, 1vw, 11px);
      color: #5a3820; letter-spacing: 0.4em; text-transform: uppercase;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.5s 1.1s ease, transform 0.5s 1.1s ease;
    }
    .intro-content.animate-in .intro-sub { opacity: 1; transform: translateY(0); }

    /* ── GLITCH ── */
    .glitching .intro-logo { animation: glitchMain 0.25s steps(1) infinite; }
    .glitching .intro-logo::before { opacity: 1; animation: glitchSliceA 0.25s steps(1) infinite; }
    .glitching .intro-logo::after  { opacity: 1; animation: glitchSliceB 0.25s steps(1) infinite; }

    @keyframes glitchMain {
      0%,100% { transform: translate(0,0); }
      30%      { transform: translate(-2px, 0); }
      60%      { transform: translate(2px, 0); }
    }
    @keyframes glitchSliceA {
      0%,100% { clip-path: polygon(0 0,0 0,0 0,0 0); transform: translate(0,0); color: #ff6060; }
      20%     { clip-path: polygon(0 25%, 100% 25%, 100% 40%, 0 40%); transform: translate(-3px,0); }
      50%     { clip-path: polygon(0 60%, 100% 60%, 100% 72%, 0 72%); transform: translate(3px,0); }
      80%     { clip-path: polygon(0 10%, 100% 10%, 100% 22%, 0 22%); transform: translate(-2px,0); }
    }
    @keyframes glitchSliceB {
      0%,100% { clip-path: polygon(0 0,0 0,0 0,0 0); transform: translate(0,0); color: #60d0ff; }
      20%     { clip-path: polygon(0 55%, 100% 55%, 100% 68%, 0 68%); transform: translate(3px,0); }
      50%     { clip-path: polygon(0 30%, 100% 30%, 100% 42%, 0 42%); transform: translate(-3px,0); }
      80%     { clip-path: polygon(0 75%, 100% 75%, 100% 85%, 0 85%); transform: translate(2px,0); }
    }

    /* ── MAIN SCREEN ── */
    #main {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 10;
    }
    #main.show { opacity: 1; pointer-events: all; }
    #main.hide { opacity: 0; pointer-events: none; }

    /* Vignette overlay on main too */
    #main::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10,5,2,0.55) 100%);
      pointer-events: none; z-index: -1;
    }

    .top-bar, .bot-bar {
      position: fixed; left: 0; right: 0; height: 6px;
      background: linear-gradient(90deg, #3a1a08, #7c4f2a, #c8803a, #7c4f2a, #3a1a08);
      z-index: 20;
    }
    .top-bar { top: 0; }
    .bot-bar { bottom: 0; }

    .corner {
      position: fixed; width: 40px; height: 40px;
      border-color: #a0673a; border-style: solid; z-index: 20;
    }
    .corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

    .company-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 700;
      color: #e8c898;
      letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 0.2rem; text-align: center;
      text-shadow: 0 2px 20px rgba(200,140,60,0.35), 0 0 60px rgba(180,110,40,0.15);
    }
    .divider {
      width: 100px; height: 1.5px;
      background: linear-gradient(90deg, transparent, #a0673a, transparent);
      margin: 0 auto clamp(1rem, 2vh, 2rem);
    }

    /* Glass card */
    .notice-card {
      background: rgba(255,245,232,0.82);
      backdrop-filter: blur(18px) saturate(1.3);
      -webkit-backdrop-filter: blur(18px) saturate(1.3);
      border: 1.5px solid rgba(210,175,130,0.6);
      border-radius: 14px;
      padding: clamp(1.2rem, 3vh, 2.2rem) clamp(1.5rem, 4vw, 3rem);
      max-width: min(560px, 88vw); width: 100%;
      text-align: center; position: relative;
      box-shadow: 0 8px 40px rgba(80,40,10,0.35), 0 2px 8px rgba(200,140,60,0.1), inset 0 1px 0 rgba(255,255,255,0.5);
    }
    .notice-card::before {
      content: ''; position: absolute;
      top: -1.5px; left: 32px; right: 32px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #c8803a, #e8a050, #c8803a, transparent);
      border-radius: 2px;
    }

    .live-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(245,225,200,0.7); border: 1px solid rgba(200,150,80,0.5);
      border-radius: 20px; padding: 5px 16px;
      font-size: clamp(10px, 1.1vw, 13px); font-weight: 600;
      color: #7c4f2a; letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: clamp(0.8rem, 1.5vh, 1.5rem);
    }
    .dot {
      width: 8px; height: 8px; background: #c06020;
      border-radius: 50%; animation: pulse 1.6s ease-in-out infinite;
      box-shadow: 0 0 6px rgba(192,96,32,0.8);
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px rgba(192,96,32,0.8); }
      50%      { opacity: 0.4; transform: scale(0.75); box-shadow: 0 0 2px rgba(192,96,32,0.3); }
    }

    .headline {
      font-size: clamp(10px, 1vw, 13px); color: #a07040;
      letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .event-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem); font-weight: 400;
      color: #3a1f08; margin-bottom: clamp(0.8rem, 1.5vh, 1.5rem); line-height: 1.3;
    }
    .venue-row, .schedule-row {
      display: flex; align-items: center; justify-content: center;
      gap: 12px;
      background: rgba(250,235,210,0.6);
      border: 1px solid rgba(210,185,150,0.5);
      border-radius: 8px; padding: clamp(0.6rem, 1.2vh, 1rem) 1.5rem;
      margin-bottom: clamp(0.6rem, 1vh, 1rem);
    }
    .venue-row i, .schedule-row i { font-size: clamp(18px, 2vw, 24px); color: #7c4f2a; }
    .venue-label, .schedule-label {
      font-size: clamp(9px, 0.9vw, 11px); color: #a07850;
      letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 2px;
    }
    .venue-name, .schedule-time {
      font-size: clamp(14px, 1.6vw, 18px); font-weight: 600;
      color: #4a2c0e; letter-spacing: 0.04em;
    }
    .live-time-row {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; margin-top: 0.5rem;
      font-size: clamp(12px, 1.2vw, 15px); color: #8a6035; letter-spacing: 0.1em;
    }
    .live-time-row i { color: #7c4f2a; font-size: clamp(14px, 1.3vw, 17px); vertical-align: -1px; }
    #clock { color: #5a3518; font-weight: 600; }
  </style>
</head>
<body>

  <!-- LIVE BACKGROUND CANVAS -->
  <canvas id="bgCanvas"></canvas>

  <!-- INTRO SCREEN -->
  <div id="intro">
    <div class="scanline"></div>
    <div class="vignette"></div>
    <div class="intro-content">
      <p class="welcome-label">Welcome to DIRTI COFFEE</p>
      <p class="intro-logo" data-text="Integral">Integral</p>
      <div class="intro-divider"></div>
      <p class="intro-sub"></p>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="main">
    <div class="top-bar"></div>
    <div class="bot-bar"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <p class="company-name">Integral</p>
    <div class="divider"></div>
    <div class="notice-card">
      <div class="live-badge"><span class="dot"></span>In Progress</div>
      <p class="headline">DIRTI COFFEE</p>
      <p class="event-title">Company Training</p>
      <div class="venue-row">
        <i class="ti ti-building" aria-hidden="true"></i>
        <div><p class="venue-label">Venue</p><p class="venue-name">Function Hall</p></div>
      </div>
      <div class="schedule-row">
        <i class="ti ti-calendar-time" aria-hidden="true"></i>
        <div><p class="schedule-label">Schedule</p><p class="schedule-time">8:00 AM – 5:00 PM</p></div>
      </div>
      <div class="live-time-row">
        <i class="ti ti-clock"></i>
        <span id="clock"></span>
      </div>
    </div>
  </div>

  <script>
    /* ─────────────────────────────────────────
       LIVE COFFEE BACKGROUND CANVAS
    ───────────────────────────────────────── */
    const canvas = document.getElementById('bgCanvas');
    const ctx    = canvas.getContext('2d');

    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Colour palette (warm espresso tones) ──
    const BG_TOP    = '#120a04';
    const BG_BOTTOM = '#1e0f06';

    // ── Coffee bean / circle particles ──
    const PARTICLE_COUNT = 55;
    const particles = [];

    function randRange(a, b) { return a + Math.random() * (b - a); }

    class Particle {
      constructor() { this.reset(true); }
      reset(initial) {
        this.x  = randRange(0, W);
        this.y  = initial ? randRange(0, H) : H + randRange(10, 60);
        this.r  = randRange(2, 7);
        this.vx = randRange(-0.18, 0.18);
        this.vy = randRange(-0.35, -0.12);
        this.alpha = randRange(0.04, 0.22);
        this.hue = randRange(22, 38);          // warm brown tones
        this.saturation = randRange(40, 70);
        this.lightness  = randRange(38, 58);
        this.wobble = randRange(0, Math.PI * 2);
        this.wobbleSpeed = randRange(0.008, 0.025);
        this.wobbleAmp   = randRange(0.2, 0.9);
      }
      update() {
        this.wobble += this.wobbleSpeed;
        this.x += this.vx + Math.sin(this.wobble) * this.wobbleAmp;
        this.y += this.vy;
        if (this.y < -this.r * 2) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue},${this.saturation}%,${this.lightness}%)`;
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

    // ── Steam / wisp particles ──
    const STEAM_COUNT = 28;
    const steams = [];

    class Steam {
      constructor() { this.reset(true); }
      reset(initial) {
        this.x       = randRange(0.05, 0.95) * W;
        this.y       = initial ? randRange(0, H) : H + randRange(20, 120);
        this.vy      = randRange(-0.25, -0.08);
        this.alpha   = 0;
        this.maxAlpha = randRange(0.05, 0.18);
        this.life    = 0;
        this.maxLife = randRange(220, 420);
        this.width   = randRange(18, 60);
        this.height  = randRange(40, 100);
        this.drift   = randRange(-0.08, 0.08);
        this.phase   = randRange(0, Math.PI * 2);
        this.phaseSpd = randRange(0.006, 0.018);
      }
      update() {
        this.life++;
        this.phase += this.phaseSpd;
        this.x    += this.drift + Math.sin(this.phase) * 0.4;
        this.y    += this.vy;
        // fade in / fade out
        const t = this.life / this.maxLife;
        this.alpha = t < 0.25
          ? (t / 0.25) * this.maxAlpha
          : t > 0.75
            ? ((1 - t) / 0.25) * this.maxAlpha
            : this.maxAlpha;
        if (this.life >= this.maxLife || this.y < -this.height) this.reset(false);
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        // vertical gradient wisp
        const grd = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.width
        );
        grd.addColorStop(0,   'rgba(220,175,110,0.9)');
        grd.addColorStop(0.5, 'rgba(180,120,60,0.4)');
        grd.addColorStop(1,   'rgba(120,60,20,0)');
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.width * 0.5, this.height * 0.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < STEAM_COUNT; i++) steams.push(new Steam());

    // ── Sparkle / coffee ground specs ──
    const SPARK_COUNT = 30;
    const sparks = [];

    class Spark {
      constructor() { this.reset(true); }
      reset(initial) {
        this.x     = randRange(0, W);
        this.y     = initial ? randRange(0, H) : H + randRange(5, 30);
        this.vy    = randRange(-0.1, -0.04);
        this.vx    = randRange(-0.06, 0.06);
        this.size  = randRange(0.5, 2.2);
        this.alpha = randRange(0.1, 0.45);
        this.life  = 0;
        this.maxLife = randRange(300, 700);
        this.hue   = randRange(28, 50);
      }
      update() {
        this.life++;
        this.x += this.vx;
        this.y += this.vy;
        if (this.life > this.maxLife || this.y < -5) this.reset(false);
      }
      draw() {
        const t = this.life / this.maxLife;
        const a = this.alpha * (1 - t * t);
        ctx.save();
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue}, 60%, 65%)`;
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < SPARK_COUNT; i++) sparks.push(new Spark());

    // ── Draw loop ──
    function drawBackground() {
      // Gradient background
      const bgGrd = ctx.createLinearGradient(0, 0, 0, H);
      bgGrd.addColorStop(0, BG_TOP);
      bgGrd.addColorStop(1, BG_BOTTOM);
      ctx.fillStyle = bgGrd;
      ctx.fillRect(0, 0, W, H);

      // Subtle radial warm glow center
      const glow = ctx.createRadialGradient(W*0.5, H*0.55, 0, W*0.5, H*0.55, W*0.45);
      glow.addColorStop(0,   'rgba(120,60,15,0.22)');
      glow.addColorStop(0.5, 'rgba(80,30,8,0.1)');
      glow.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
    }

    function animate() {
      drawBackground();

      // Draw steams first (bottom layer)
      steams.forEach(s => { s.update(); s.draw(); });

      // Particles on top
      particles.forEach(p => { p.update(); p.draw(); });

      // Sparks on top
      sparks.forEach(s => { s.update(); s.draw(); });

      requestAnimationFrame(animate);
    }
    animate();

    /* ─────────────────────────────────────────
       CLOCK
    ───────────────────────────────────────── */
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2,'0');
      const s = String(now.getSeconds()).padStart(2,'0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').textContent = h + ':' + m + ':' + s + ' ' + ampm;
    }
    updateClock();
    setInterval(updateClock, 1000);

    /* ─────────────────────────────────────────
       INTRO / MAIN SEQUENCE
    ───────────────────────────────────────── */
    const intro   = document.getElementById('intro');
    const content = intro.querySelector('.intro-content');
    const main    = document.getElementById('main');

    const WELCOME_HOLD = 2500;
    const GLITCH_DUR   = 800;
    const MAIN_HOLD    = 60000;
    const FADE_DUR     = 600;

    function showIntro() {
      intro.classList.remove('hide');
      intro.classList.add('show');
      content.classList.remove('animate-in', 'glitching');
      void content.offsetWidth;

      requestAnimationFrame(() => { content.classList.add('animate-in'); });

      setTimeout(() => {
        content.classList.add('glitching');
        setTimeout(() => {
          content.classList.remove('glitching');
          intro.classList.remove('show');
          intro.classList.add('hide');
          main.classList.add('show');

          setTimeout(() => {
            main.classList.remove('show');
            main.classList.add('hide');
            setTimeout(() => {
              main.classList.remove('hide');
              intro.classList.remove('hide');
              showIntro();
            }, FADE_DUR);
          }, MAIN_HOLD);

        }, GLITCH_DUR);
      }, WELCOME_HOLD);
    }

    showIntro();
  </script>
</body>
</html>
